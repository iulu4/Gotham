name: Gotham CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black pytest pytest-cov bandit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 1. Análise de Qualidade (Linting) com Ruff (mais rápido que o Flake8)
    - name: Lint with Ruff
      run: ruff check .

    # 2. Verificação de Formatação com Black
    - name: Check Formatting with Black
      run: black --check .

    # 3. Verificação de Segurança com Bandit
    - name: Security Scan with Bandit
      run: bandit -r . -x ./tests

    # 4. Testes Unitários com PyTest e Cobertura
    - name: Run Tests with PyTest
      run: |
        pytest --cov=./ --cov-report=xml

    # 5. Upload do relatório de cobertura (Opcional, para badges)
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
